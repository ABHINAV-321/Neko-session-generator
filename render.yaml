# Render.com deployment configuration
# This file tells Render how to build and run your app

services:
  - type: web
    name: whatsapp-session-generator
    env: node
    plan: free # or 'starter' for $7/month, 'standard' for $25/month
    buildCommand: npm install --production
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: UPSTASH_REDIS_REST_URL
        fromDatabase:
          name: whatsapp-sessions-redis
          property: connectionString
      - key: UPSTASH_REDIS_REST_TOKEN
        fromDatabase:
          name: whatsapp-sessions-redis
          property: token
      - key: PORT
        value: 10000 # Render sets this automatically, but we use it

databases:
  - name: whatsapp-sessions-redis
    type: redis
    plan: free # Redis needed for session storage
